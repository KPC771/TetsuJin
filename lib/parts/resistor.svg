<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50.8 25.4" width="50.8" height="25.4">
  <!-- Pin 1 lead -->
  <line x1="12.7" y1="12.7" x2="16" y2="12.7" stroke="#c0a000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pin 2 lead -->
  <line x1="34.8" y1="12.7" x2="38.1" y2="12.7" stroke="#c0a000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="16" y="8" width="18.8" height="9.4" rx="3" fill="#d4905a" stroke="#8b5a2b" stroke-width="0.8"/>
  <!-- Tolerance band (gold) -->
  <rect x="30" y="8" width="2" height="9.4" fill="#f0c000" opacity="0.9"/>
  <!-- Value band 1 -->
  <rect x="19" y="8" width="2" height="9.4" fill="#222" opacity="0.8"/>
  <!-- Value band 2 -->
  <rect x="22.5" y="8" width="2" height="9.4" fill="#222" opacity="0.8"/>
  <!-- Pin 1 hole marker -->
  <circle cx="12.7" cy="12.7" r="2.2" fill="#c8a000" stroke="#7a6000" stroke-width="0.5"/>
  <circle cx="12.7" cy="12.7" r="0.8" fill="#333"/>
  <!-- Pin 2 hole marker -->
  <circle cx="38.1" cy="12.7" r="2.2" fill="#c8a000" stroke="#7a6000" stroke-width="0.5"/>
  <circle cx="38.1" cy="12.7" r="0.8" fill="#333"/>
</svg>
